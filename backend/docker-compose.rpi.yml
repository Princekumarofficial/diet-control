services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project-shred-backend
    env_file:
      - .env
    environment:
      SQLITE_PATH: /data/db.sqlite3
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/dashboard/today/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  backend_data:
